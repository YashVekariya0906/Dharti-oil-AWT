<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dharti-oil</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/javascript">
      // Prevent React from crashing when Google Translate mutates the DOM
      if (typeof Node === 'function' && Node.prototype) {
        const originalRemoveChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            console.warn('Caught Google Translate DOM mutation error in removeChild');
            return child;
          }
          return originalRemoveChild.apply(this, arguments);
        };
        const originalInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, referenceNode) {
          if (referenceNode && referenceNode.parentNode !== this) {
            console.warn('Caught Google Translate DOM mutation error in insertBefore');
            return newNode;
          }
          return originalInsertBefore.apply(this, arguments);
        };
      }

      function googleTranslateElementInit() {
        const checkExist = setInterval(function() {
          if (document.getElementById('google_translate_element')) {
            clearInterval(checkExist);
            new google.translate.TranslateElement({
              pageLanguage: 'en',
              includedLanguages: 'en,gu',
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: false
            }, 'google_translate_element');
          }
        }, 100); 
      }
    </script>
    <style>
      /* =====================================================
         Google Translate Bar — Total Suppression
         Prevents ANY top offset or bar from appearing
         ===================================================== */

      /* Reset Google Translate styles to allow CSS-based hover reveal */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate > iframe,
      .skiptranslate > iframe.goog-te-banner-frame,
      #goog-gt-tt,
      .goog-te-gadget,
      .goog-te-gadget-simple {
        /* Styles moved to Navbar.css for better control */
      }

      body {
        top: 0 !important;
        position: static !important;
        margin-top: 0 !important;
        padding-top: 0 !important;
        transform: none !important;
      }

      html {
        top: 0 !important;
        margin-top: 0 !important;
        padding-top: 0 !important;
      }

      /* Hide Google tooltips and highlights */
      .goog-tooltip,
      .goog-tooltip:hover,
      .goog-te-balloon-frame {
        display: none !important;
      }

      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
    </style>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
